<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="../css/Profile.css">
</head>

<body>
<header>
    <nav class="navbar">
        <ul>
            <li> <a href="Homepage.html"> Homepage </a></li>
            <li> <a href="Search.html"> Search </a></li>
        </ul>
    </nav>

    <!-- YOUR PHOTO HERE -->
    <img class="profile-pic" src="../images/my-photo.jpeg" alt="Profile-Picture"  >
</header>

<main>

    <!-- Ideally this data should be received from a DB -->\
    <section class="your-info">
        <div class="field">
            <h3>Name</h3>
            <span id="name" class="value"></span>
        </div>

        <div class="field">
            <h3>Major</h3>
            <span id="major" class="value"></span>
        </div>

        <div class="field">
            <h3>Year</h3>
            <span id="year" class="value"></span>
        </div>

        <div class="field">
            <h3>Gender</h3>
            <span id="gender" class="value"></span>
        </div>

        <div class="field">
            <h3>Bio</h3>
            <span id="bio" class="value"></span>
        </div>

        <div class="field">
            <h3>Classes</h3>
            <span id="classes" class="value"></span>
        </div>

        <div class="field">
            <h3>Groups</h3>
            <span id="groups" class="value"></span>
        </div>

    </section>


    <section class="buttons">
        <button type="button"> Update </button>
        <button type="button"> Search </button>
        <button type="button"> View Group </button>
        <button type="button"> Create Group </button>
    </section>

</main>

<footer>
    <p> &copy; Study Group Finder UHV</p>
</footer>

</body>
</html>
